  order-service:
    build: ./d3-order-service
    container_name: order-service
    ports:
      - "8083:8083"
    environment:
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/viva-eventos
      DB_URL: jdbc:postgresql://order-db:5432/orderdb
      DB_DRIVER: org.postgresql.Driver
      DB_USER: order_user
      DB_PASSWORD: order_pass
      TICKET_SERVICE_URL: http://ticket-service:8082
    depends_on:
      - order-db
      - keycloak
    networks:
      - vivaeventos-net

  order-db:
    image: postgres:16-alpine
    container_name: order-db
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_pass
    volumes:
      - order-db-data:/var/lib/postgresql/data
    networks:
      - vivaeventos-net
