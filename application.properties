# ========================
# SERVIDOR
# ========================
server.port=8083

# ========================
# BASE DE DATOS
# ========================
spring.datasource.url=${DB_URL:jdbc:h2:mem:orderdb}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ========================
# KEYCLOAK
# ========================
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/viva-eventos}

# ========================
# OTROS SERVICIOS
# ========================
ticket.service.url=${TICKET_SERVICE_URL:http://localhost:8082}